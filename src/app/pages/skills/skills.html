<div class="section">

    <app-section-title
      command="cat skills.json"
      subtitle="Technologies and tools I work with regularly"
    />

    <div class="skills-grid">
      @for (group of skillGroups; track group.category) {
        <app-skill-card [group]="group" />
      }
    </div>
  </div>
</div>
